services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "8080"
      REDIS_URL: "redis://redis:6379"
      MIGRATIONS_DIR: "/app/migrations"
    volumes:
      # Mount GCP service-account key if GOOGLE_APPLICATION_CREDENTIALS points here
      # - ./gcp-key.json:/run/secrets/gcp-key.json:ro
      - api_logs:/var/log/ai-gateway
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e",
        "fetch('http://localhost:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  redis_data:
  api_logs:
