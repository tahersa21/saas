# ── Nginx HTTPS configuration for VPS with Let's Encrypt ──────────────────────
#
# Prerequisites:
#   1. Install certbot:  apt install certbot python3-certbot-nginx
#   2. Obtain cert:      certbot --nginx -d yourdomain.com
#   3. Certbot will auto-patch this file — or replace manually.
#
# Paths referenced below assume the API runs on localhost:8080
# and the dashboard static files are in /var/www/ai-gateway.
#
# To use with docker-compose, point the api upstream at the container name.

upstream api_server {
    server 127.0.0.1:8080;   # bare-metal / PM2
    # server api:8080;        # docker-compose (uncomment if using Docker)
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS certificates (filled in by certbot or manually) ──────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # ── TLS hardening ─────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # HSTS — forces HTTPS for 1 year (enable only after verifying HTTPS works)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Common settings ───────────────────────────────────────────────────────
    client_max_body_size 25M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/x-font-ttf font/opentype;
    gzip_min_length 1024;

    # ── API + V1 proxy ────────────────────────────────────────────────────────
    location ~ ^/(api|v1)/ {
        proxy_pass         http://api_server;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout  30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # SSE / streaming — disable buffering for real-time responses
        proxy_buffering       off;
        proxy_cache           off;
    }

    # ── Dashboard SPA static files ────────────────────────────────────────────
    root  /var/www/ai-gateway;
    index index.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
